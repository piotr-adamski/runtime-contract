name: Supply-chain security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-security:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"

      - name: Audit locked runtime dependencies
        run: |
          uv export --locked --no-dev --no-emit-project --format requirements-txt --output-file audited-requirements.txt
          uvx --from pip-audit==2.10.1 pip-audit -r audited-requirements.txt --progress-spinner off

      - name: Run high-confidence SAST
        run: uvx --from bandit==1.9.4 bandit -r src -q -lll -iii

  secret-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan tracked history without exposing values
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITLEAKS_ENABLE_SUMMARY: "false"
