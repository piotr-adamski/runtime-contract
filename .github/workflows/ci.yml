name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
          cache-python: false

      - name: Report environment and resolve exact base
        id: base
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          uv --version
          uv python install 3.14
          uv run --python 3.14 python --version
          echo "Runner image: ${ImageOS:-unknown}"
          echo "Runner image version: ${ImageVersion:-unknown}"
          echo "Runner image release: ${ImageRelease:-unknown}"
          case "$EVENT_NAME" in
            pull_request)
              base_sha=$PR_BASE_SHA
              ;;
            push)
              base_sha=$PUSH_BEFORE_SHA
              if [[ $base_sha =~ ^0+$ ]]; then
                echo "Push event has no credible before SHA" >&2
                exit 1
              fi
              ;;
            workflow_dispatch)
              base_sha=$(git rev-parse --verify HEAD^)
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME" >&2
              exit 1
              ;;
          esac
          git cat-file -e "${base_sha}^{commit}"
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "Exact comparison range: ${base_sha}..HEAD"

      - name: Run quality gates
        if: github.actor != 'dependabot[bot]'
        run: ./scripts/quality-gates.sh --base-ref "${{ steps.base.outputs.base_sha }}"

      - name: Run quality gates for trusted Dependabot metadata
        if: github.actor == 'dependabot[bot]'
        run: ./scripts/quality-gates.sh --base-ref "${{ steps.base.outputs.base_sha }}" --allow-dependabot

      - name: Confirm the lockfile stayed unchanged
        run: git diff --exit-code -- uv.lock

      - name: Upload the validated distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: runtime-contract-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 1

  compatibility:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    needs: quality-gates
    name: compatibility (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
          cache-python: false

      - name: Download the validated distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: runtime-contract-distributions
          path: artifact

      - name: Normalize the checkout for byte-stable tests
        if: runner.os == 'Windows'
        run: |
          set -euo pipefail
          git config core.autocrlf false
          git reset --hard HEAD

      - name: Report environment
        env:
          PYTHON_VERSION: ${{ matrix.python }}
        run: |
          set -euo pipefail
          uv --version
          uv python install "$PYTHON_VERSION"
          uv run --python "$PYTHON_VERSION" python --version
          echo "Runner image: ${ImageOS:-unknown}"
          echo "Runner image version: ${ImageVersion:-unknown}"
          echo "Runner image release: ${ImageRelease:-unknown}"

      - name: Verify SHA-256 manifest
        run: uv run --python "${{ matrix.python }}" python scripts/ci/verify_sha256.py artifact/SHA256SUMS

      - name: Run the complete test suite without coverage
        env:
          PYTHON_VERSION: ${{ matrix.python }}
          PYTEST_BASETEMP: ${{ runner.temp }}/runtime-contract-py-${{ matrix.python }}
        run: |
          set -euo pipefail
          uv sync --locked --all-groups --python "$PYTHON_VERSION"
          uv run --python "$PYTHON_VERSION" pytest --basetemp "$PYTEST_BASETEMP"
          git diff --exit-code -- uv.lock

      - name: Test wheel, entry point, paths, encodings, and four-command E2E
        env:
          PYTHON_VERSION: ${{ matrix.python }}
        run: |
          set -euo pipefail
          wheel=$(find "$GITHUB_WORKSPACE/artifact" -maxdepth 1 -type f -name '*.whl' -print)
          uv run --python "$PYTHON_VERSION" python scripts/ci/e2e_wheel.py \
            --wheel "$wheel" --python "$PYTHON_VERSION" --fixture tests/fixtures/full-stack

      - name: Smoke-test the sdist on Python 3.14
        if: matrix.os == 'ubuntu-24.04' && matrix.python == '3.14'
        run: |
          set -euo pipefail
          sdist=$(find "$GITHUB_WORKSPACE/artifact" -maxdepth 1 -type f -name '*.tar.gz' -print)
          test "$(printf '%s\n' "$sdist" | sed '/^$/d' | wc -l)" -eq 1
          temp_dir=$(mktemp -d)
          uv venv --python 3.14 "$temp_dir/venv"
          uv pip install --python "$temp_dir/venv/bin/python" "$sdist"
          cd "$temp_dir"
          PYTHONPATH= "$temp_dir/venv/bin/python" -c 'import importlib.metadata; import runtime_contract; assert importlib.metadata.version("runtime-contract") == "0.1.2"'
          PYTHONPATH= "$temp_dir/venv/bin/python" -m runtime_contract --version
          PYTHONPATH= "$temp_dir/venv/bin/runtime-contract" --help >/dev/null
          for command in scan check explain diff config; do
            PYTHONPATH= "$temp_dir/venv/bin/runtime-contract" "$command" --help >/dev/null
          done
          PYTHONPATH= "$temp_dir/venv/bin/python" -c 'from runtime_contract.config.schema import schema_bytes; assert schema_bytes()'
          PYTHONPATH= "$temp_dir/venv/bin/python" -c 'from runtime_contract.analysis import Analyzer, AnalyzerInput, AnalyzerRegistry, AnalysisDiagnostic, AnalysisResult, AnalysisCompleteness, DiagnosticCode, Confidence, FactKind, FactObservation, ClassificationResolver, EffectiveClassification, DecisionSource, AnalyzerNotRegisteredError, AnalyzerExecutionError, DockerfileAnalyzer; from runtime_contract.analysis.schema import schema_bytes; assert schema_bytes() and Analyzer and ClassificationResolver and DockerfileAnalyzer'
          PYTHONPATH= "$temp_dir/venv/bin/python" -c 'from runtime_contract.normalization import NormalizationError, NormalizationErrorCode, normalize_observations; assert normalize_observations(()).model_dump_json() and NormalizationError and NormalizationErrorCode'

  dependency-range:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    needs: quality-gates
    name: dependencies (${{ matrix.profile }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: minimum
            resolution: lowest-direct
            python: "3.11"
            constraints: scripts/ci/minimum-constraints.txt
          - profile: latest-compatible
            resolution: highest
            python: "3.14"
            constraints: ""
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"
          enable-cache: true
          cache-python: false

      - name: Download the validated distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: runtime-contract-distributions
          path: artifact

      - name: Test the selected dependency range
        env:
          PYTHON_VERSION: ${{ matrix.python }}
          RESOLUTION: ${{ matrix.resolution }}
          CONSTRAINTS: ${{ matrix.constraints }}
        run: |
          set -euo pipefail
          wheel=$(find "$GITHUB_WORKSPACE/artifact" -maxdepth 1 -type f -name '*.whl' -print)
          test "$(printf '%s\n' "$wheel" | sed '/^$/d' | wc -l)" -eq 1
          uv venv --python "$PYTHON_VERSION" .dependency-venv
          constraint_args=()
          if [[ -n $CONSTRAINTS ]]; then
            constraint_args=(--constraint "$CONSTRAINTS")
          fi
          uv pip install --python .dependency-venv/bin/python --resolution "$RESOLUTION" \
            "${constraint_args[@]}" "$wheel" 'pytest>=9.1.1,<10' 'jsonschema>=4.26,<5'
          .dependency-venv/bin/python -m pytest
          uv pip check --python .dependency-venv/bin/python
          .dependency-venv/bin/python -m pip --version >/dev/null 2>&1 || true
          uv pip freeze --python .dependency-venv/bin/python

  action-compatibility:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    needs: quality-gates
    name: action (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Invoke the local Action like a consumer
        id: runtime-contract
        uses: ./
        with:
          command: check
          path: examples/demo/fixed
          config: runtime-contract.yaml

      - name: Verify the installed public release and product exit
        shell: bash
        env:
          EXIT_CODE: ${{ steps.runtime-contract.outputs.exit-code }}
          INSTALLED_VERSION: ${{ steps.runtime-contract.outputs.runtime-contract-version }}
          RESULT_FILE: ${{ steps.runtime-contract.outputs.result-file }}
        run: |
          set -euo pipefail
          test "$EXIT_CODE" = 0
          test "$INSTALLED_VERSION" = 0.1.2
          test -z "$RESULT_FILE"

  action-e2e:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    needs: quality-gates
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up uv for fixture assertions
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Prepare clean consumer copies and source snapshots
        shell: bash
        run: |
          set -euo pipefail
          cp -R examples/demo/fixed "$RUNNER_TEMP/consumer-clean"
          cp -R examples/demo/broken "$RUNNER_TEMP/consumer-broken"
          cp -R examples/demo/fixed "$RUNNER_TEMP/consumer space żółć; touch ACTION_PWNED"
          uv run python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          def snapshot(root: Path) -> dict[str, str]:
              return {
                  item.relative_to(root).as_posix(): hashlib.sha256(item.read_bytes()).hexdigest()
                  for item in sorted(root.rglob("*"))
                  if item.is_file()
              }

          base = Path(os.environ["RUNNER_TEMP"])
          for name in ("consumer-clean", "consumer-broken"):
              (base / f"{name}.before.json").write_text(
                  json.dumps(snapshot(base / name), sort_keys=True), encoding="utf-8"
              )
          PY

      - name: Produce clean JSON through uses
        id: json
        uses: ./
        with:
          command: scan
          path: ${{ runner.temp }}/consumer-clean
          format: json
          config: runtime-contract.yaml
          output: runtime-contract.json

      - name: Produce blocking SARIF through uses
        id: sarif
        continue-on-error: true
        uses: ./
        with:
          command: check
          path: ${{ runner.temp }}/consumer-broken
          format: sarif
          fail-on: error
          output: runtime-contract.sarif

      - name: Exercise explain through uses
        id: explain
        uses: ./
        with:
          command: explain
          rule: RTC001
          format: json
          output: action-explain.json

      - name: Exercise diff through uses
        id: diff
        uses: ./
        with:
          command: diff
          left: ${{ runner.temp }}/consumer-clean
          right: ${{ runner.temp }}/consumer-broken
          format: json
          output: action-diff.json

      - name: Pass spaces, Unicode, and shell metacharacters literally
        id: unusual-path
        uses: ./
        with:
          command: check
          path: ${{ runner.temp }}/consumer space żółć; touch ACTION_PWNED

      - name: Reject an unsupported command
        id: invalid-command
        continue-on-error: true
        uses: ./
        with:
          command: check; touch ACTION_PWNED

      - name: Fail closed for a nonexistent product version
        id: invalid-version
        continue-on-error: true
        uses: ./
        with:
          version: 999999.0.0

      - name: Validate outputs, reports, exits, and source integrity
        shell: bash
        env:
          JSON_EXIT: ${{ steps.json.outputs.exit-code }}
          JSON_FILE: ${{ steps.json.outputs.result-file }}
          JSON_VERSION: ${{ steps.json.outputs.runtime-contract-version }}
          SARIF_OUTCOME: ${{ steps.sarif.outcome }}
          SARIF_EXIT: ${{ steps.sarif.outputs.exit-code }}
          SARIF_FILE: ${{ steps.sarif.outputs.result-file }}
          EXPLAIN_EXIT: ${{ steps.explain.outputs.exit-code }}
          DIFF_EXIT: ${{ steps.diff.outputs.exit-code }}
          UNUSUAL_EXIT: ${{ steps.unusual-path.outputs.exit-code }}
          INVALID_COMMAND_OUTCOME: ${{ steps.invalid-command.outcome }}
          INVALID_COMMAND_EXIT: ${{ steps.invalid-command.outputs.exit-code }}
          INVALID_VERSION_OUTCOME: ${{ steps.invalid-version.outcome }}
          INVALID_VERSION_EXIT: ${{ steps.invalid-version.outputs.exit-code }}
        run: |
          set -euo pipefail
          test "$JSON_EXIT" = 0
          test "$JSON_VERSION" = 0.1.2
          test "$SARIF_OUTCOME" = failure
          test "$SARIF_EXIT" = 1
          test "$EXPLAIN_EXIT" = 0
          test "$DIFF_EXIT" = 0
          test "$UNUSUAL_EXIT" = 0
          test "$INVALID_COMMAND_OUTCOME" = failure
          test "$INVALID_COMMAND_EXIT" = 2
          test "$INVALID_VERSION_OUTCOME" = failure
          test "$INVALID_VERSION_EXIT" = 2
          test ! -e ACTION_PWNED
          uv run python - "$JSON_FILE" "$SARIF_FILE" <<'PY'
          import hashlib
          import json
          import os
          import sys
          from pathlib import Path

          json_file, sarif_file = map(Path, sys.argv[1:])
          report = json.loads(json_file.read_text(encoding="utf-8"))
          sarif = json.loads(sarif_file.read_text(encoding="utf-8"))
          assert report["schema_id"] == "runtime-contract/v1"
          assert sarif["version"] == "2.1.0"
          assert sarif["runs"][0]["results"]
          assert all(
              not location["physicalLocation"]["artifactLocation"]["uri"].startswith(("/", "file:"))
              for result in sarif["runs"][0]["results"]
              for location in result.get("locations", [])
          )

          def snapshot(root: Path, ignored: set[str]) -> dict[str, str]:
              return {
                  item.relative_to(root).as_posix(): hashlib.sha256(item.read_bytes()).hexdigest()
                  for item in sorted(root.rglob("*"))
                  if item.is_file() and item.relative_to(root).as_posix() not in ignored
              }

          base = Path(os.environ["RUNNER_TEMP"])
          pairs = (
              ("consumer-clean", {"runtime-contract.json"}),
              ("consumer-broken", {"runtime-contract.sarif"}),
          )
          for name, ignored in pairs:
              before = json.loads((base / f"{name}.before.json").read_text(encoding="utf-8"))
              assert snapshot(base / name, ignored) == before
          PY

  quality:
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    needs: [quality-gates, compatibility, dependency-range, action-compatibility, action-e2e]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Require every preceding job to succeed
        env:
          QUALITY_GATES_RESULT: ${{ needs.quality-gates.result }}
          COMPATIBILITY_RESULT: ${{ needs.compatibility.result }}
          DEPENDENCY_RANGE_RESULT: ${{ needs.dependency-range.result }}
          ACTION_COMPATIBILITY_RESULT: ${{ needs.action-compatibility.result }}
          ACTION_E2E_RESULT: ${{ needs.action-e2e.result }}
        run: |
          set -euo pipefail
          test "$QUALITY_GATES_RESULT" = success
          test "$COMPATIBILITY_RESULT" = success
          test "$DEPENDENCY_RANGE_RESULT" = success
          test "$ACTION_COMPATIBILITY_RESULT" = success
          test "$ACTION_E2E_RESULT" = success
          echo "All required CI jobs succeeded."
