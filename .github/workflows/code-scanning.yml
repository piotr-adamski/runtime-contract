name: runtime-contract Code Scanning

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  runtime-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"
          cache: pip

      - name: Install runtime-contract
        run: python -m pip install .

      - name: Generate SARIF
        id: scan
        shell: bash
        run: |
          set +e
          runtime-contract check . \
            --config .github/runtime-contract-code-scanning.yaml \
            --format sarif \
            --output runtime-contract.sarif
          status=$?
          set -e
          if [[ $status -gt 1 ]]; then
            echo "runtime-contract could not produce a reliable scan (exit $status)" >&2
            exit "$status"
          fi
          echo "findings=$([[ $status -eq 1 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Retain SARIF for audit
        if: always() && hashFiles('runtime-contract.sarif') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-contract-sarif
          path: runtime-contract.sarif
          if-no-files-found: error
          retention-days: 7

      - name: Upload SARIF to GitHub Code Scanning
        if: always() && hashFiles('runtime-contract.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          sarif_file: runtime-contract.sarif
          category: runtime-contract

      - name: Report finding policy
        if: steps.scan.outputs.findings == 'true'
        run: echo "runtime-contract findings were uploaded to Code Scanning."
