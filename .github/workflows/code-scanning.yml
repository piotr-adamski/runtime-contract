name: runtime-contract Code Scanning

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  runtime-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"

      - name: Install runtime-contract
        run: |
          uv python install 3.14
          uv tool install --python 3.14 .

      - name: Generate SARIF
        id: scan
        shell: bash
        run: |
          set +e
          runtime-contract check . \
            --config .github/runtime-contract-code-scanning.yaml \
            --format sarif \
            --output runtime-contract.sarif
          status=$?
          set -e
          if [[ $status -gt 1 ]]; then
            echo "runtime-contract could not produce a reliable scan (exit $status)" >&2
            exit "$status"
          fi
          echo "findings=$([[ $status -eq 1 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Retain SARIF for audit
        if: always() && hashFiles('runtime-contract.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: runtime-contract-sarif
          path: runtime-contract.sarif
          if-no-files-found: error
          retention-days: 7

      - name: Upload SARIF to GitHub Code Scanning
        if: always() && hashFiles('runtime-contract.sarif') != ''
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          sarif_file: runtime-contract.sarif
          category: runtime-contract

      - name: Report finding policy
        if: steps.scan.outputs.findings == 'true'
        run: echo "runtime-contract findings were uploaded to Code Scanning."
