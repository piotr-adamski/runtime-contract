apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  PUBLIC_URL: https://example.invalid
  SERVICE_TOKEN: unsafe-placeholder
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
stringData:
  DATABASE_URL: hidden-placeholder
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  selector:
    matchLabels: {app: api}
  template:
    metadata:
      labels: {app: api}
    spec:
      containers:
        - name: api
          image: example.invalid/runtime-contract-fixture:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: {name: app-secret, key: DATABASE_URL}
          envFrom:
            - configMapRef: {name: app-config}
